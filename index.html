<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guía de Hongos Adaptógenos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1a1410; --paper:#f7f3ec;
  --teal:#3aada8; --gold:#b8862a;
  --muted:#8a7a68; --line:rgba(26,20,16,.12);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--ink);}

/* noise */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");}

/* ══ LAYOUT ══ */
.page{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1;}

/* Header */
.top-bar{
  flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:clamp(1.5rem,3vw,2.8rem) clamp(1.5rem,5vw,5rem) clamp(1rem,2vw,1.8rem);
  border-bottom:1px solid var(--line);
}
.top-left{}
.eyebrow{font-size:clamp(.48rem,.6vw,.62rem);letter-spacing:.35em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem;}
.main-title{font-family:'Cormorant Garamond',serif;font-weight:300;line-height:1.05;
  font-size:clamp(1.6rem,3vw,3.2rem);letter-spacing:-.02em;}
.main-title em{font-style:italic;color:var(--teal);}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem;}
.counter{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,5rem);
  font-weight:300;color:var(--line);line-height:1;letter-spacing:-.05em;}
.counter-label{font-size:clamp(.44rem,.55vw,.58rem);letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}

/* Tag progress bar */
.progress-bar{
  flex-shrink:0;
  display:flex;align-items:center;gap:1rem;
  padding:.7rem clamp(1.5rem,5vw,5rem);
  border-bottom:1px solid var(--line);
}
.prog-track{flex:1;height:1px;background:var(--line);position:relative;}
.prog-fill{position:absolute;left:0;top:0;height:100%;background:var(--teal);transition:width .4s ease;}
.prog-tag{font-size:clamp(.44rem,.55vw,.58rem);letter-spacing:.28em;text-transform:uppercase;color:var(--teal);white-space:nowrap;}
.prog-index{font-size:clamp(.44rem,.55vw,.58rem);letter-spacing:.2em;color:var(--muted);white-space:nowrap;}

/* Carousel area */
.carousel-area{flex:1;position:relative;overflow:hidden;min-height:0;}

/* Nav arrows */
.nav-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:clamp(38px,3.5vw,52px);height:clamp(38px,3.5vw,52px);
  border:1px solid var(--line);border-radius:50%;
  background:rgba(247,243,236,.92);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:20;
  transition:background .2s,border-color .2s,transform .2s;
  box-shadow:0 2px 14px rgba(26,20,16,.07);
}
.nav-arrow:hover{background:var(--ink);border-color:var(--ink);}
.nav-arrow:hover svg{stroke:var(--paper);}
.nav-arrow:active{transform:translateY(-50%) scale(.92);}
.nav-arrow.off{opacity:.2;pointer-events:none;}
.nav-arrow svg{width:clamp(14px,1.4vw,18px);height:clamp(14px,1.4vw,18px);stroke:var(--muted);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.nav-prev{left:clamp(1rem,2.5vw,3rem);}
.nav-next{right:clamp(1rem,2.5vw,3rem);}

/* Track */
.carousel-track{display:flex;height:100%;transition:transform .48s cubic-bezier(.25,.8,.25,1);will-change:transform;}
.slide{
  flex-shrink:0;width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem clamp(4rem,10vw,12rem) 1.5rem;
  cursor:grab;
}
.slide:active{cursor:grabbing;}

/* Jar image */
.jar-img-wrap{
  transition:transform .5s cubic-bezier(.34,1.3,.64,1),opacity .4s,filter .4s;
  transform:scale(.62);opacity:.3;filter:blur(2px);
  display:flex;justify-content:center;width:100%;margin-left:25px;
}
.slide.active .jar-img-wrap{transform:scale(1);opacity:1;filter:none;}
.slide.adj .jar-img-wrap{transform:scale(.7);opacity:.45;filter:blur(.8px);}

.jar-img-wrap img{
  height:clamp(180px,28vh,320px);width:auto;
  display:block;
  filter:drop-shadow(6px 14px 24px rgba(0,0,0,.16));
  transition:filter .3s, transform .2s;
  cursor:pointer;
}
.jar-img-wrap img:hover{ transform:scale(1.03); }
.slide-name{ cursor:pointer; }
.slide-name:hover{ color:var(--teal); }
.slide.active .jar-img-wrap img{filter:drop-shadow(8px 18px 32px rgba(0,0,0,.2));}

/* Slide text */
.slide-idx{font-size:clamp(.44rem,.55vw,.6rem);letter-spacing:.35em;color:var(--teal);
  margin-top:clamp(1rem,2.5vh,2rem);
  opacity:0;transition:opacity .4s ease .1s;}
.slide.active .slide-idx{opacity:1;}
.slide-name{font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(1.8rem,4vw,3.8rem);line-height:1.05;color:var(--ink);
  margin-top:.25rem;text-align:center;
  opacity:0;transform:translateY(10px);transition:opacity .4s ease .15s,transform .4s ease .15s;}
.slide.active .slide-name{opacity:1;transform:none;}
.slide-latin{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.7rem,1.1vw,1rem);color:var(--muted);
  margin-top:.3rem;text-align:center;
  opacity:0;transform:translateY(6px);transition:opacity .4s ease .22s,transform .4s ease .22s;}
.slide.active .slide-latin{opacity:1;transform:none;}
.slide-hint{font-size:clamp(.42rem,.52vw,.56rem);letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);margin-top:clamp(.6rem,1.5vh,1.2rem);
  display:flex;align-items:center;gap:.6rem;
  opacity:0;transition:opacity .4s ease .3s;}
.slide-hint::before,.slide-hint::after{content:'';display:block;width:clamp(14px,2vw,24px);height:1px;background:var(--muted);opacity:.35;}
.slide.active .slide-hint{opacity:.55;}

/* Footer dots */
.bottom-bar{
  flex-shrink:0;
  display:flex;align-items:center;gap:clamp(.8rem,2vw,2rem);
  padding:clamp(.7rem,1.2vw,1.2rem) clamp(1.5rem,5vw,5rem);
  border-top:1px solid var(--line);
}
.dots{display:flex;gap:.45rem;flex-shrink:0;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);opacity:.3;
  transition:opacity .3s,transform .3s,background .3s;cursor:pointer;}
.dot.on{opacity:1;transform:scale(1.5);background:var(--teal);}
.footer-name{font-family:'Cormorant Garamond',serif;font-size:clamp(.9rem,1.4vw,1.3rem);
  color:var(--ink);flex:1;transition:all .3s;}
.footer-copy{font-size:clamp(.42rem,.5vw,.54rem);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);opacity:.4;}
.cta-btn{font-size:clamp(.44rem,.52vw,.56rem);letter-spacing:.22em;text-transform:uppercase;
  color:var(--teal);border:1px solid rgba(58,173,168,.5);
  padding:clamp(.3rem,.5vw,.5rem) clamp(.6rem,1vw,1rem);
  border-radius:2px;cursor:pointer;background:transparent;
  transition:background .2s,color .2s,border-color .2s;white-space:nowrap;
  font-family:'DM Mono',monospace;}
.cta-btn:hover{background:var(--teal);color:var(--paper);border-color:var(--teal);}
.cta-btn:active{background:var(--teal-dark,#1b4a47);}

/* ══ SHEET ══ */
.sheet-bg{position:fixed;inset:0;background:rgba(26,20,16,0);z-index:30;
  pointer-events:none;transition:background .35s;}
.sheet-bg.on{background:rgba(26,20,16,.38);pointer-events:all;}

.sheet{
  position:fixed;z-index:40;
  background:var(--ink);color:var(--paper);
  transition:transform .44s cubic-bezier(.32,.72,0,1);
}

/* Mobile: bottom sheet */
@media(max-width:767px){
  .sheet{bottom:0;left:0;right:0;border-radius:14px 14px 0 0;
    transform:translateY(100%);max-height:72vh;display:flex;flex-direction:column;}
  .sheet.on{transform:none;}
  .sheet-handle{width:34px;height:3px;border-radius:2px;
    background:rgba(247,243,236,.18);margin:.9rem auto 0;flex-shrink:0;}
}
/* Desktop: right panel */
@media(min-width:768px){
  .sheet{top:0;right:0;bottom:0;width:min(420px,38vw);
    transform:translateX(100%);border-radius:0;
    display:flex;flex-direction:column;
    box-shadow:-8px 0 48px rgba(26,20,16,.18);}
  .sheet.on{transform:none;}
  .sheet-handle{display:none;}
}

.sheet-body{overflow-y:auto;padding:clamp(1.2rem,2.5vw,2rem) clamp(1.5rem,3vw,2.5rem) 3rem;flex:1;}
.sheet-tag{font-size:.52rem;letter-spacing:.32em;text-transform:uppercase;
  color:var(--teal);display:block;margin-bottom:.35rem;}
.sheet-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3vw,2.8rem);
  font-weight:300;line-height:1.1;margin-bottom:.2rem;}
.sheet-latin{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.8rem;color:rgba(247,243,236,.42);display:block;margin-bottom:1.2rem;}
.sheet-rule{height:1px;background:rgba(247,243,236,.1);margin-bottom:1.2rem;}
.sheet-headline{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1rem,1.5vw,1.3rem);color:rgba(247,243,236,.75);
  display:block;margin-bottom:1rem;line-height:1.3;}
.sheet-contra{font-size:clamp(.7rem,.8vw,.82rem)!important;color:rgba(247,243,236,.4)!important;}
.sheet-nutrients{font-size:clamp(.72rem,.82vw,.88rem)!important;color:rgba(247,243,236,.55)!important;line-height:1.7;}
.sheet-price-row{display:flex;align-items:center;justify-content:space-between;
  margin-top:1.2rem;padding-top:1rem;border-top:1px solid rgba(247,243,236,.1);}
.sheet-price-label{font-size:.48rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
.sheet-price{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--teal);}
.sheet-buy-btn{display:block;margin-top:.9rem;text-align:center;
  padding:.6rem 1rem;background:var(--teal);color:var(--paper);
  font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  text-decoration:none;border-radius:2px;
  transition:background .2s;}
.sheet-buy-btn:hover{background:#2d9491;}
.sheet-label{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--teal);display:block;margin-bottom:.38rem;}
.sheet-text{font-size:clamp(.78rem,.9vw,.95rem);line-height:1.75;
  color:rgba(247,243,236,.65);margin-bottom:1.1rem;}
.sheet-chips{display:flex;flex-wrap:wrap;gap:.3rem;}
.chip{font-size:.5rem;letter-spacing:.1em;border:1px solid rgba(58,173,168,.35);
  color:var(--teal);padding:.14rem .45rem;border-radius:1px;}
.sheet-close{position:absolute;top:1.1rem;right:1.4rem;
  width:28px;height:28px;border-radius:50%;
  background:rgba(247,243,236,.07);border:none;cursor:pointer;
  color:rgba(247,243,236,.45);font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:background .2s;}
.sheet-close:hover{background:rgba(247,243,236,.14);}
</style>
</head>

<div class="page">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-left">
      <span class="eyebrow">Medicina micelial · fungipharma.cl</span>
      <h1 class="main-title">Guía de <em>Hongos Adaptógenos</em></h1>
    </div>
    <div class="top-right">
      <span class="counter">07</span>
      <span class="counter-label">extractos</span>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar">
    <span class="prog-index" id="progIndex">01 / 07</span>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:14.28%"></div></div>
    <span class="prog-tag" id="progTag">Adaptógeno</span>

  <!-- CAROUSEL -->
  <div class="carousel-area">
    <button class="nav-arrow nav-prev off" id="navPrev">

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">

    <span class="footer-copy">fungipharma.cl</span>
    <button class="cta-btn" id="ctaBtn">Ver propiedades</button>
  </div>

</div>

<!-- SHEET -->
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" id="sheetClose">✕</button>
  <div class="sheet-body">

    <span class="sheet-latin" id="sLatin"></span>
    <div class="sheet-rule"></div>
    <span class="sheet-headline" id="sHeadline"></span>
    <span class="sheet-label">Descripción</span>
    <p class="sheet-text" id="sPara"></p>
    <span class="sheet-label">Beneficios principales</span>
    <div class="sheet-chips" id="sBeneficios"></div>
    <span class="sheet-label" style="margin-top:.8rem;display:block;">Se recomienda para</span>
    <div class="sheet-chips" id="sChips"></div>
    <span class="sheet-label" style="margin-top:.8rem;display:block;">Nutrientes presentes</span>
    <p class="sheet-text sheet-nutrients" id="sNutrientes"></p>
    <span class="sheet-label">Modo de uso</span>
    <p class="sheet-text" id="sDosis"></p>
    <span class="sheet-label">Ingredientes</span>
    <p class="sheet-text" id="sIngredientes"></p>
    <span class="sheet-label">Contraindicaciones</span>
    <p class="sheet-text sheet-contra" id="sContra"></p>
    <div class="sheet-price-row"><span class="sheet-price-label">Precio</span><span class="sheet-price" id="sPrecio"></span></div>
    <a class="sheet-buy-btn" id="sBuyBtn" href="https://fungipharma.cl/collections/all" target="_blank">Comprar en fungipharma.cl →</a>
  </div>
</div>

/* Build slides */
const track = document.getElementById('carTrack');
const dotsEl = document.getElementById('dots');
FUNGI.forEach((f,i) => {
  const sl = document.createElement('div');
  sl.className = 'slide'+(i===0?' active':'');
  sl.dataset.i = i;
  sl.innerHTML = `
    <div class="jar-img-wrap"><img src="${IMGS[f.id]}" alt="${f.n}"></div>
    <span class="slide-idx">0${i+1} / 07</span>
    <div class="slide-name">${f.n}</div>
    <div class="slide-latin">${f.lat}</div>
    <div class="slide-hint">Ver propiedades</div>`;
  track.appendChild(sl);
  const d = document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.addEventListener('click',()=>goTo(i));
  dotsEl.appendChild(d);
});

let cur=0, sheetOpen=false;

function goTo(idx, anim=true){
  if(idx<0||idx>=FUNGI.length)return;
  cur=idx;
  const f=FUNGI[idx];
  const W = track.parentElement.clientWidth;
  if(!anim) track.style.transition='none';
  track.style.transform=`translateX(${-idx*W}px)`;
  if(!anim) requestAnimationFrame(()=>track.style.transition='');
  document.querySelectorAll('.slide').forEach((s,i)=>{
    s.classList.toggle('active',i===cur);
    s.classList.toggle('adj',Math.abs(i-cur)===1);
  });
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
  document.getElementById('progFill').style.width=`${(cur+1)/FUNGI.length*100}%`;
  document.getElementById('progTag').textContent=f.tag;
  document.getElementById('progIndex').textContent=`0${cur+1} / 07`;
  document.getElementById('footerName').textContent=f.n;
  document.getElementById('navPrev').classList.toggle('off',cur===0);
  document.getElementById('navNext').classList.toggle('off',cur===FUNGI.length-1);
}

// Recalculate track on resize
window.addEventListener('resize',()=>goTo(cur,false));

function openSheet(){
  const f=FUNGI[cur];
  document.getElementById('sTag').textContent=f.tag;
  document.getElementById('sName').textContent=f.n;
  document.getElementById('sLatin').textContent=f.lat;
  document.getElementById('sHeadline').textContent=f.headline;
  document.getElementById('sPara').textContent=f.para;
  document.getElementById('sBeneficios').innerHTML=f.beneficios.map(c=>`<span class="chip">${c}</span>`).join('');
  document.getElementById('sChips').innerHTML=f.rec.map(c=>`<span class="chip">${c}</span>`).join('');
  document.getElementById('sNutrientes').textContent=f.nutrientes;
  document.getElementById('sDosis').textContent=f.dosis;
  document.getElementById('sIngredientes').textContent=f.ingredientes;
  document.getElementById('sContra').textContent=f.contra;
  document.getElementById('sPrecio').textContent=f.precio;
  document.getElementById('sheet').classList.add('on');
  document.getElementById('sheetBg').classList.add('on');
  sheetOpen=true;
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('sheetBg').classList.remove('on');
  sheetOpen=false;
}

document.getElementById('ctaBtn').addEventListener('click',openSheet);
document.getElementById('sheetClose').addEventListener('click',closeSheet);
document.getElementById('sheetBg').addEventListener('click',closeSheet);
document.getElementById('navPrev').addEventListener('click',()=>goTo(cur-1));
document.getElementById('navNext').addEventListener('click',()=>goTo(cur+1));

// Click on slide
// navegación solo por arrows — click en slide desactivado

// Swipe/drag
let sx=0,isDragging=false,moved=false;
const area=document.querySelector('.carousel-area');
function onStart(x){sx=x;isDragging=false;moved=false;track.style.transition='none';}
function onMove(x){
  const dx=x-sx;
  if(!moved&&Math.abs(dx)>5){isDragging=true;moved=true;}
  if(!isDragging)return;
  const W=area.clientWidth;
  track.style.transform=`translateX(${-cur*W+dx}px)`;
}
function onEnd(x){
  const dx=x-sx,W=area.clientWidth,thr=W*.2;
  track.style.transition='';
  if(isDragging){
    if(dx<-thr&&cur<FUNGI.length-1)goTo(cur+1);
    else if(dx>thr&&cur>0)goTo(cur-1);
    else goTo(cur);
  }
  isDragging=false;
}
// Touch swipe (mobile only)
area.addEventListener('touchstart',e=>{if(!sheetOpen){sx=e.touches[0].clientX;isDragging=false;moved=false;track.style.transition='none';}},{passive:true});
area.addEventListener('touchmove', e=>{if(!sheetOpen){const dx=e.touches[0].clientX-sx;if(!moved&&Math.abs(dx)>5){isDragging=true;moved=true;}if(isDragging){const W=area.clientWidth;track.style.transform=`translateX(${-cur*W+dx}px)`;}}},{passive:true});
area.addEventListener('touchend',  e=>{if(!sheetOpen){track.style.transition='';const dx=e.changedTouches[0].clientX-sx,W=area.clientWidth,thr=W*.2;if(isDragging){if(dx<-thr&&cur<FUNGI.length-1)goTo(cur+1);else if(dx>thr&&cur>0)goTo(cur-1);else goTo(cur);}isDragging=false;}});
// Mouse drag desactivado — usar flechas para navegar en desktop

// Click en frasco o nombre abre el sheet
document.getElementById('carTrack').addEventListener('click', e => {
  const img = e.target.closest('.jar-img-wrap');
  const name = e.target.closest('.slide-name');
  if ((img || name) && !sheetOpen) openSheet();
});

// Sheet swipe down (mobile)
const sh=document.getElementById('sheet');
let shY=0;
sh.addEventListener('touchstart',e=>{shY=e.touches[0].clientY;},{passive:true});
sh.addEventListener('touchend',  e=>{if(e.changedTouches[0].clientY-shY>60)closeSheet();},{passive:true});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')goTo(cur-1);
  if(e.key==='ArrowRight')goTo(cur+1);
  if(e.key==='Escape')closeSheet();
});

goTo(0,false);
</script>
